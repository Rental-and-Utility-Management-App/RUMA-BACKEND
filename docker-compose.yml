services:
  mongo:
    image: mongo:7
    container_name: ruma-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ruma-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: rental_app
      # ĐỔI JWT_SECRET này khi deploy thật, và set APP_ENV=production
      # (app sẽ tự chối khởi động nếu APP_ENV=production mà JWT_SECRET không an toàn)
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRE_HOURS: "72"
      CORS_ALLOWED_ORIGINS: "*"

volumes:
  mongo_data: