schemes:
- http
securityDefinitions:
  BearerAuth:
    description: Dán trực tiếp giá trị token vào đây (không cần gõ "Bearer " phía
      trước, server tự nhận diện cả 2 dạng)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"