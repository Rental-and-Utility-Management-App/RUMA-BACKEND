basePath: /
definitions:
  handlers.addTenantToContractRequest:
    properties:
      tenant_id:
        type: string
    required:
    - tenant_id
    type: object
  handlers.assignRoomRequest:
    properties:
      room_id:
        type: string
    required:
    - room_id
    type: object
  handlers.changePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
        x-order: "1"
      old_password:
        type: string
        x-order: "0"
    required:
    - new_password
    - old_password
    type: object
  handlers.checkoutContractRequest:
    properties:
      actual_end_date:
        description: 'ActualEndDate: để trống -> dùng thời điểm hiện tại. Nếu có,
          định dạng "YYYY-MM-DD".'
        type: string
      deduction_note:
        description: 'DeductionNote: lý do trừ cọc (nếu refund_amount < số cọc đang
          giữ).'
        type: string
      reason:
        description: 'Reason: lý do chấm dứt hợp đồng nói chung (hết hạn, vi phạm,
          thỏa thuận...).'
        type: string
      refund_amount:
        description: |-
          RefundAmount: số tiền cọc thực trả lại cho tenant (có thể < số đã thu
          nếu trừ phí hư hỏng/nợ tiền phòng...). Bắt buộc khai báo rõ ràng,
          không tự động suy luận, để manager luôn kiểm soát số tiền hoàn.
        minimum: 0
        type: number
      refund_method:
        $ref: '#/definitions/models.PaymentMethod'
    type: object
  handlers.collectDepositRequest:
    properties:
      amount:
        type: number
      method:
        $ref: '#/definitions/models.PaymentMethod'
      note:
        type: string
    required:
    - amount
    - method
    type: object
  handlers.confirmDraftInvoiceRequest:
    properties:
      due_date:
        description: 'format: 2006-01-02, để trống giữ nguyên due_date tạm của bản
          nháp'
        type: string
      electric_new:
        type: number
      occupants:
        type: integer
      other_fees:
        type: number
      other_note:
        type: string
      water_new:
        type: number
    required:
    - electric_new
    - water_new
    type: object
  handlers.createContractRequest:
    properties:
      deposit_amount:
        minimum: 0
        type: number
      end_date:
        description: '"YYYY-MM-DD"'
        type: string
      monthly_rent:
        description: 'MonthlyRent: để trống -> lấy theo giá niêm yết hiện tại của
          phòng.'
        type: number
      note:
        type: string
      room_id:
        type: string
      start_date:
        description: '"YYYY-MM-DD", vd "2025-07-01"'
        type: string
      tenant_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - end_date
    - room_id
    - start_date
    - tenant_ids
    type: object
  handlers.createInvoiceRequest:
    properties:
      due_date:
        description: 'format: 2006-01-02'
        type: string
      electric_new:
        type: number
      electric_old:
        description: |-
          ElectricOld/WaterOld: để trống (null) để hệ thống TỰ ĐỘNG lấy chỉ số mới nhất
          (electric_new/water_new) của hóa đơn gần nhất cùng phòng làm chỉ số cũ tháng này.
          Chỉ cần nhập tay khi: hóa đơn đầu tiên của phòng, hoặc vừa thay đồng hồ điện/nước mới.
        type: number
      month:
        maximum: 12
        minimum: 1
        type: integer
      occupants:
        description: |-
          Occupants: để trống (null) để hệ thống tự lấy số người hiện tại của phòng
          (room.occupants). Chỉ cần nhập tay nếu tháng này số người ở khác với
          số đang lưu trên phòng (vd: có người mới dọn vào/ra giữa tháng).
        type: integer
      other_fees:
        type: number
      other_note:
        type: string
      room_id:
        type: string
      water_new:
        type: number
      water_old:
        type: number
      year:
        type: integer
    required:
    - electric_new
    - month
    - room_id
    - water_new
    - year
    type: object
  handlers.createPaymentRequest:
    properties:
      amount:
        type: number
      invoice_id:
        type: string
      method:
        allOf:
        - $ref: '#/definitions/models.PaymentMethod'
        enum:
        - cash
        - bank_transfer
        - other
      note:
        type: string
      paid_at:
        description: 'format: 2006-01-02, mặc định là hôm nay'
        type: string
    required:
    - amount
    - invoice_id
    - method
    type: object
  handlers.createRoomRequest:
    properties:
      capacity:
        minimum: 1
        type: integer
      code:
        type: string
      floor:
        type: integer
      management_fee_per_person:
        type: number
      monthly_rent:
        type: number
      name:
        type: string
      note:
        type: string
      occupants:
        type: integer
      price_electricity:
        type: number
      price_water:
        type: number
    required:
    - capacity
    - code
    - monthly_rent
    - price_electricity
    - price_water
    type: object
  handlers.createTenantRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      room_id:
        description: optional lúc tạo, có thể gán phòng sau
        type: string
    required:
    - full_name
    - password
    - phone
    type: object
  handlers.extendContractRequest:
    properties:
      new_end_date:
        description: '"YYYY-MM-DD"'
        type: string
      new_monthly_rent:
        description: để trống = giữ nguyên giá cũ
        type: number
      note:
        type: string
    required:
    - new_end_date
    type: object
  handlers.generateDraftInvoicesRequest:
    properties:
      month:
        description: |-
          Month/Year: để trống -> dùng tháng/năm hiện tại. Chỉ cần truyền khi
          manager muốn tạo bù cho 1 tháng cụ thể khác tháng hiện tại.
        type: integer
      year:
        type: integer
    type: object
  handlers.loginRequest:
    properties:
      password:
        type: string
        x-order: "1"
      phone:
        type: string
        x-order: "0"
    required:
    - password
    - phone
    type: object
  handlers.sepayWebhookPayload:
    properties:
      accountNumber:
        type: string
      accumulated:
        type: number
      code:
        type: string
      content:
        type: string
      description:
        type: string
      gateway:
        type: string
      id:
        description: ID giao dịch phía SePay, dùng để chống trùng lặp
        type: integer
      referenceCode:
        type: string
      subAccount:
        type: string
      transactionDate:
        type: string
      transferAmount:
        type: number
      transferType:
        description: '"in" | "out"'
        type: string
    type: object
  handlers.updateContractRequest:
    properties:
      deposit_amount:
        description: |-
          DepositAmount: chỉ cho sửa khi CHƯA thu đồng cọc nào (deposit_paid == 0),
          tránh làm sai lệch deposit_status đã tính dựa trên số đã thu.
        minimum: 0
        type: number
      monthly_rent:
        type: number
      note:
        type: string
    type: object
  handlers.updateInvoiceRequest:
    properties:
      due_date:
        description: 'format: 2006-01-02'
        type: string
      electric_new:
        type: number
      occupants:
        type: integer
      other_fees:
        type: number
      other_note:
        type: string
      water_new:
        type: number
    type: object
  handlers.updatePaymentRequest:
    properties:
      amount:
        type: number
      method:
        allOf:
        - $ref: '#/definitions/models.PaymentMethod'
        enum:
        - cash
        - bank_transfer
        - other
      note:
        type: string
      paid_at:
        description: 'format: 2006-01-02'
        type: string
    type: object
  handlers.updateRoomRequest:
    properties:
      capacity:
        minimum: 1
        type: integer
      floor:
        type: integer
      management_fee_per_person:
        type: number
      monthly_rent:
        type: number
      name:
        type: string
      note:
        type: string
      occupants:
        type: integer
      price_electricity:
        type: number
      price_water:
        type: number
      status:
        allOf:
        - $ref: '#/definitions/models.RoomStatus'
        enum:
        - available
        - occupied
    type: object
  handlers.updateTenantRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      is_active:
        type: boolean
    type: object
  models.PaymentMethod:
    enum:
    - cash
    - bank_transfer
    - other
    type: string
    x-enum-varnames:
    - PaymentMethodCash
    - PaymentMethodTransfer
    - PaymentMethodOther
  models.RoomStatus:
    enum:
    - available
    - occupied
    type: string
    x-enum-varnames:
    - RoomStatusAvailable
    - RoomStatusOccupied
host: localhost:8080
info:
  contact:
    email: support@ruma.local
    name: RUMA Support
  description: 'API quản lý nhà trọ: phòng, người thuê, hóa đơn, thanh toán.'
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: RUMA Backend API
  version: "1.0"
paths:
  /api/auth/change-password:
    put:
      consumes:
      - application/json
      description: Đổi mật khẩu cho user đang đăng nhập.
      parameters:
      - description: Mật khẩu cũ và mới
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Đổi mật khẩu
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Đăng nhập chung cho cả Manager và Tenant, trả về JWT token.
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Đăng nhập
      tags:
      - Auth
  /api/auth/me:
    get:
      consumes:
      - application/json
      description: Lấy thông tin user đang đăng nhập (từ JWT token).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy thông tin bản thân
      tags:
      - Auth
  /api/contracts:
    get:
      consumes:
      - application/json
      description: Manager xem tất cả (lọc được theo room_id, status). Tenant chỉ
        xem hợp đồng của mình.
      parameters:
      - description: Lọc theo phòng
        in: query
        name: room_id
        type: string
      - description: Lọc theo trạng thái (active|ended|terminated|cancelled)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Danh sách hợp đồng
      tags:
      - Contracts
    post:
      consumes:
      - application/json
      description: |-
        Manager tạo hợp đồng thuê cho 1 nhóm tenant vào 1 phòng: gán
        tenant vào phòng, khởi tạo thông tin cọc/thời hạn. Phòng đích
        không được có hợp đồng "active" khác, và tenant không được
        đang thuộc phòng nào khác.
      parameters:
      - description: Thông tin hợp đồng
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.createContractRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Tạo hợp đồng thuê mới (checkin)
      tags:
      - Contracts
  /api/contracts/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xem chi tiết hợp đồng
      tags:
      - Contracts
    put:
      consumes:
      - application/json
      description: |-
        Sửa ghi chú/giá thuê/tiền cọc thỏa thuận (deposit_amount chỉ sửa được khi chưa thu cọc).
        Để đổi ngày hết hạn, dùng endpoint gia hạn (/extend). Để kết thúc hợp đồng, dùng /checkout.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      - description: Dữ liệu cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.updateContractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cập nhật thông tin hợp đồng
      tags:
      - Contracts
  /api/contracts/{id}/cancel:
    post:
      consumes:
      - application/json
      description: |-
        Chỉ hủy được khi hợp đồng đang active VÀ chưa thu đồng cọc nào.
        Nếu đã thu cọc, phải dùng /checkout để hoàn/giữ cọc đúng quy trình.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hủy hợp đồng (ký nhầm / đổi ý, chưa thu cọc)
      tags:
      - Contracts
  /api/contracts/{id}/checkout:
    post:
      consumes:
      - application/json
      description: |-
        Manager xác nhận tenant trả phòng: đóng hợp đồng (ended nếu tới/qua
        hạn, terminated nếu chấm dứt sớm), hoàn cọc theo refund_amount (có thể
        giữ lại 1 phần), gỡ toàn bộ tenant của hợp đồng khỏi phòng.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      - description: Thông tin checkout
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.checkoutContractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Checkout / kết thúc hợp đồng
      tags:
      - Contracts
  /api/contracts/{id}/collect-deposit:
    post:
      consumes:
      - application/json
      description: Manager ghi nhận 1 lần thu cọc (có thể thu nhiều lần cho tới khi
        đủ deposit_amount).
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      - description: Thông tin thu cọc
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.collectDepositRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Thu tiền cọc
      tags:
      - Contracts
  /api/contracts/{id}/deposit-transactions:
    get:
      consumes:
      - application/json
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lịch sử thu/hoàn/giữ cọc của 1 hợp đồng
      tags:
      - Contracts
  /api/contracts/{id}/extend:
    post:
      consumes:
      - application/json
      description: |-
        Manager gia hạn hợp đồng đang active, đẩy end_date ra xa hơn.
        Lịch sử gia hạn được lưu lại trong renewals để tra cứu.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      - description: Thông tin gia hạn
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.extendContractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Gia hạn hợp đồng
      tags:
      - Contracts
  /api/contracts/{id}/tenants:
    post:
      consumes:
      - application/json
      description: |-
        Manager thêm 1 tenant có sẵn vào hợp đồng đang active (ở ghép
        giữa chừng), gán luôn tenant đó vào phòng của hợp đồng. Tenant
        phải chưa thuộc phòng nào khác và chưa đứng tên hợp đồng active nào khác.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      - description: Tenant cần thêm
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.addTenantToContractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Thêm 1 người ở ghép vào hợp đồng đang active
      tags:
      - Contracts
  /api/contracts/{id}/tenants/{tenantId}:
    delete:
      consumes:
      - application/json
      description: |-
        Manager gỡ 1 tenant khỏi hợp đồng đang active (những tenant
        khác vẫn ở lại, hợp đồng vẫn active). Không cho gỡ nếu đây là
        tenant cuối cùng của hợp đồng - trường hợp đó phải dùng
        /checkout hoặc /cancel để đóng hẳn hợp đồng.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: string
      - description: Tenant ID cần gỡ
        in: path
        name: tenantId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Gỡ 1 người ở ghép khỏi hợp đồng đang active
      tags:
      - Contracts
  /api/invoices:
    get:
      consumes:
      - application/json
      description: Manager xem tất cả, Tenant chỉ xem hóa đơn của mình. Có thể lọc
        theo room_id, status.
      parameters:
      - description: Lọc theo phòng
        in: query
        name: room_id
        type: string
      - description: Lọc theo trạng thái
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Danh sách hóa đơn
      tags:
      - Invoices
    post:
      consumes:
      - application/json
      description: Manager tạo hóa đơn cho 1 phòng trong 1 tháng.
      parameters:
      - description: Thông tin hóa đơn
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.createInvoiceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Tạo hóa đơn
      tags:
      - Invoices
  /api/invoices/{id}:
    get:
      consumes:
      - application/json
      description: Xem thông tin chi tiết một hóa đơn theo ID.
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xem chi tiết hóa đơn
      tags:
      - Invoices
    put:
      consumes:
      - application/json
      description: |-
        Manager sửa hóa đơn tạo sai. CHỈ cho phép sửa khi hóa đơn chưa
        ghi nhận thanh toán nào (paid_amount == 0) - nếu đã có thanh
        toán, hãy hủy hóa đơn (cancel) rồi tạo lại để tránh làm lệch
        số tiền đã thu.
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      - description: Dữ liệu cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.updateInvoiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Sửa hóa đơn
      tags:
      - Invoices
  /api/invoices/{id}/cancel:
    post:
      consumes:
      - application/json
      description: |-
        Manager hủy 1 hóa đơn tạo sai. CHỈ cho phép hủy khi chưa ghi
        nhận thanh toán nào (paid_amount == 0), để không mất dấu vết
        dòng tiền đã thu. Hóa đơn hủy vẫn được giữ lại (soft-cancel) để
        tra cứu, không tính vào check trùng phòng/tháng khi tạo hóa đơn mới.
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hủy hóa đơn
      tags:
      - Invoices
  /api/invoices/{id}/confirm:
    put:
      consumes:
      - application/json
      description: |-
        Manager điền chỉ số điện/nước thật cho hóa đơn do cron tự động
        tạo (status=draft), hệ thống tính lại total_amount và chuyển
        hóa đơn sang "unpaid" - từ lúc này tenant mới thấy được hóa đơn.
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      - description: Chỉ số điện/nước thật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.confirmDraftInvoiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xác nhận hóa đơn nháp (điền chỉ số điện/nước)
      tags:
      - Invoices
  /api/invoices/{id}/qr-code:
    get:
      consumes:
      - application/json
      description: |-
        Sinh mã VietQR (chuyển khoản ngân hàng) với số tiền = số tiền còn lại của hóa đơn,
        nội dung chuyển khoản tự động điền theo mã phòng + tháng/năm.
        Cần cấu hình BANK_ID, BANK_ACCOUNT_NO, BANK_ACCOUNT_NAME trong biến môi trường.
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Lấy mã QR chuyển khoản cho hóa đơn
      tags:
      - Invoices
  /api/invoices/generate-draft:
    post:
      consumes:
      - application/json
      description: |-
        Manager chạy tay (hoặc để cron tự chạy đầu mỗi tháng) để tạo
        hóa đơn "draft" cho mọi phòng có hợp đồng active chưa có hóa
        đơn tháng này. Tiền phòng/phí quản lý đã tự suy ra sẵn, chỉ còn
        thiếu chỉ số điện/nước - dùng ConfirmDraftInvoice để hoàn tất.
      parameters:
      - description: Tháng/năm cần tạo (mặc định tháng hiện tại)
        in: body
        name: request
        schema:
          $ref: '#/definitions/handlers.generateDraftInvoicesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Tạo hóa đơn nháp cho toàn bộ phòng đang có hợp đồng active
      tags:
      - Invoices
  /api/payments:
    get:
      consumes:
      - application/json
      description: Manager xem tất cả, Tenant chỉ xem của mình. Có thể lọc theo invoice_id.
      parameters:
      - description: Lọc theo hóa đơn
        in: query
        name: invoice_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Danh sách thanh toán
      tags:
      - Payments
    post:
      consumes:
      - application/json
      description: Manager ghi nhận 1 lần thanh toán cho hóa đơn.
      parameters:
      - description: Thông tin thanh toán
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.createPaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ghi nhận thanh toán
      tags:
      - Payments
  /api/payments/{id}:
    delete:
      consumes:
      - application/json
      description: |-
        Manager xóa 1 payment ghi nhận nhầm. Invoice liên quan sẽ được
        tính lại paid_amount/status từ tổng các payment thực tế còn lại.
        Không cho xóa payment tự động qua webhook (is_auto_confirmed) -
        dữ liệu đó phải khớp với giao dịch ngân hàng thật, không nên xóa tay.
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Xóa 1 lần thanh toán
      tags:
      - Payments
    put:
      consumes:
      - application/json
      description: |-
        Manager sửa lại 1 payment ghi nhận nhầm (sai số tiền/phương thức/ngày).
        Invoice liên quan sẽ được tính lại paid_amount/status từ tổng
        các payment thực tế còn lại. Không cho sửa payment tự động qua webhook
        (is_auto_confirmed) vì phải khớp với giao dịch ngân hàng thật.
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      - description: Dữ liệu cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.updatePaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Sửa 1 lần thanh toán
      tags:
      - Payments
  /api/reports/summary:
    get:
      consumes:
      - application/json
      description: |-
        Manager xem nhanh doanh thu đã lập/đã thu trong 1 tháng, tỷ lệ
        lấp đầy phòng hiện tại, và danh sách công nợ (hóa đơn chưa thu đủ).
      parameters:
      - description: Tháng (mặc định tháng hiện tại)
        in: query
        name: month
        type: integer
      - description: Năm (mặc định năm hiện tại)
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Báo cáo tổng hợp (doanh thu / tỷ lệ lấp đầy / công nợ)
      tags:
      - Reports
  /api/rooms:
