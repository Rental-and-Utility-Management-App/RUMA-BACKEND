      description: |-
        Chạy ngay lập tức các job mà bình thường cron chạy tự động lúc
        nửa đêm: quét hóa đơn quá hạn, quét hợp đồng sắp hết hạn. Hữu
        ích để kiểm tra ngay không cần chờ tới giờ cron hoặc qua ngày mới.
        Không bao gồm tạo hóa đơn nháp đầu tháng - dùng riêng
