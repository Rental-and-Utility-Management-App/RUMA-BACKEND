        Endpoint public (không cần JWT) để SePay gọi đến mỗi khi có biến động số dư.
        Xác thực bằng header Authorization: Apikey <SEPAY_WEBHOOK_API_KEY>.
        Tự động đối soát theo mã tham chiếu trong nội dung chuyển khoản và ghi nhận thanh toán.
      parameters:
